services:
  api:
    build: .
    image: ${IMAGE_NAME:-eventsnap-api}:${IMAGE_TAG:-latest}
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  migrate:
    build: .
    image: ${IMAGE_NAME:-eventsnap-api}:${IMAGE_TAG:-latest}
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["alembic", "upgrade", "head"]
    profiles:
      - migrate
    restart: "no"